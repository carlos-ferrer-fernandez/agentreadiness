services:
  # Frontend (React + Vite) - FREE TIER
  - type: web
    name: groundocs-web
    runtime: static
    repo: https://github.com/carlos-ferrer-fernandez/agentreadiness
    branch: main
    rootDir: apps/web
    buildCommand: npm install && npx vite build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: VITE_API_URL
        value: https://groundocs-api.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://groundocs-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend (FastAPI) - Docker runtime for Playwright/Chromium support
  - type: web
    name: groundocs-api
    runtime: docker
    plan: free
    repo: https://github.com/carlos-ferrer-fernandez/agentreadiness
    branch: main
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
