services:
  # Frontend (React + Vite) - FREE TIER
  - type: web
    name: agentreadiness-web
    runtime: static
    repo: https://github.com/carlos-ferrer-fernandez/agentreadiness
    branch: main
    rootDir: apps/web
    buildCommand: npm install && npx vite build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: VITE_API_URL
        value: https://agentreadiness-api.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://agentreadiness-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend (FastAPI) - FREE TIER
  - type: web
    name: agentreadiness-api
    runtime: python
    plan: free
    repo: https://github.com/carlos-ferrer-fernandez/agentreadiness
    branch: main
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
