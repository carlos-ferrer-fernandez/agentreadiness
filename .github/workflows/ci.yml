name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop on syntax errors and undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,.venv
          # Warn on style issues but don't fail
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics --exclude=__pycache__,.venv

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy . --ignore-missing-imports || true

      - name: Test with pytest
        run: |
          pip install aiosqlite
          pytest tests/test_scorer.py -v

  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Test Docker compose
        run: |
          docker compose up -d
          sleep 10
          curl -f http://localhost:8000/api/health || exit 1
          docker compose down
